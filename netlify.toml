[build]
  publish = "apps/docs/dist"
  command = "npm run build && npm install --prefix apps/docs && npm run build --prefix apps/docs"

[build.environment]
  NODE_VERSION = "24.0.0"

# Redirect bare /docs to the getting-started page
[[redirects]]
  from = "/docs"
  to = "/docs/getting-started"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
